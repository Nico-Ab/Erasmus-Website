services:
  db:
    image: postgres:16
    container_name: swu-erasmus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: swu_erasmus
      POSTGRES_USER: swu_admin
      POSTGRES_PASSWORD: change_me_now
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: